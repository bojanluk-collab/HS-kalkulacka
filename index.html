<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>HS Kalkulačka</title>

<style>
*{box-sizing:border-box;}
body{font-family:system-ui;background:#f5f7fb;display:flex;justify-content:center;padding:40px;margin:0;}
.app{max-width:460px;width:100%;}
.card{background:white;border-radius:12px;padding:20px;box-shadow:0 10px 25px rgba(0,0,0,0.05);position:relative;}

input{width:100%;padding:10px 12px;margin-bottom:15px;border-radius:8px;border:1px solid #ddd;}
button{width:100%;padding:12px;border:none;border-radius:8px;background:#3b82f6;color:white;font-weight:600;cursor:pointer;}

.value{display:flex;justify-content:space-between;margin:6px 0;}
.copy{cursor:pointer;color:#888;}
.copy:hover{color:black;}

.gear{position:absolute;right:15px;top:15px;cursor:pointer;}

.menu {
    display: none;
    position: absolute;
    right: 10px;
    top: 45px;
    background: white;
    border: 1px solid #e5e7eb;
    border-radius: 12px;
    padding: 8px;
    min-width: 180px;
    box-shadow: 0 10px 20px rgba(0,0,0,0.08);
}

.menu-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    cursor: pointer;
    border-radius: 8px;
    font-size: 14px;
    white-space: nowrap; /* 🔥 zabrání zalamování */
}

.menu-row input {
    width: 16px;
    height: 16px;
    cursor: pointer;
}

.menu-row span {
    flex: 1;
}

.menu-row:hover {
    background: #f3f4f6;
}

.footer{text-align:center;font-size:12px;color:#888;margin-top:10px;}

.toast{
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    background:black;
    color:white;
    padding:10px 15px;
    border-radius:8px;
    opacity:0;
    transition:.3s;
}
.toast.show{opacity:1;}
</style>

</head>
<body>

<div class="app">
<div class="card">

<div class="gear" onclick="toggleMenu()">⚙️</div>

<div id="menu" class="menu">
    <label class="menu-row">
        <input type="checkbox" id="showA">
        <span>Benchmark A</span>
    </label>

    <label class="menu-row">
        <input type="checkbox" id="showB">
        <span>Benchmark B</span>
    </label>
</div>

<h2>CJZ - CBAM Kalkulačka</h2>

<input id="hs" list="hsList" placeholder="HS kód">
<datalist id="hsList"></datalist>

<input id="country" list="countryList" placeholder="Země">
<datalist id="countryList"></datalist>

<button onclick="calculate()">Spočítat</button>

<div id="result"></div>

</div>

<div id="version" class="footer"></div>
</div>

<div id="toast" class="toast">Zkopírováno</div>

<script src="app.js?v=8"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CJZ - CBAM Kalkulačka</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --orange: #F0821A;
  --orange-light: #FEF0E3;
  --dark: #1C1C1E;
  --mid: #6B6B6B;
  --light: #F4F4F6;
  --border: #E2E2E6;
  --white: #ffffff;
  --radius: 10px;
}

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--light);
  color: var(--dark);
  min-height: 100vh;
}

.header {
  background: var(--white);
  border-bottom: 1px solid var(--border);
  padding: 14px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.header img { height: 34px; width: auto; }

.header-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--mid);
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

.main {
  max-width: 520px;
  margin: 0 auto;
  padding: 32px 16px 56px;
}

.page-title { margin-bottom: 20px; }
.page-title h1 { font-size: 20px; font-weight: 600; color: var(--dark); }
.page-title p { font-size: 13px; color: var(--mid); margin-top: 4px; }

.card {
  background: var(--white);
  border-radius: 14px;
  border: 1px solid var(--border);
  box-shadow: 0 2px 16px rgba(0,0,0,0.06);
  overflow: hidden;
}

.card-topbar {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  padding: 10px 16px 0;
}

.settings-btn {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 11px;
  font-weight: 600;
  color: var(--mid);
  letter-spacing: 0.07em;
  text-transform: uppercase;
  cursor: pointer;
  padding: 5px 10px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--light);
  user-select: none;
  transition: border-color .15s, color .15s;
}

.settings-btn:hover { border-color: var(--orange); color: var(--orange); }
.settings-btn svg { width: 13px; height: 13px; }

.settings-bar {
  display: none;
  align-items: center;
  justify-content: space-between;
  padding: 11px 20px;
  background: var(--light);
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  margin-top: 10px;
  gap: 12px;
  flex-wrap: wrap;
}

.settings-bar.open { display: flex; }

.settings-group { display: flex; align-items: center; gap: 10px; }

.settings-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--mid);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  white-space: nowrap;
}

.toggle-group { display: flex; gap: 6px; }

.toggle {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 12px;
  font-weight: 600;
  color: var(--mid);
  cursor: pointer;
  padding: 4px 10px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--white);
  transition: all .15s;
  user-select: none;
}

.toggle input { display: none; }
.toggle.active { background: var(--orange-light); border-color: var(--orange); color: var(--orange); }

.year-select {
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  font-weight: 500;
  color: var(--dark);
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--white);
  padding: 4px 10px;
  cursor: pointer;
  outline: none;
}

.year-select:focus { border-color: var(--orange); }

.card-body { padding: 22px 20px; }

.field { margin-bottom: 14px; }

.field label {
  display: block;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--mid);
  margin-bottom: 6px;
}

.field input {
  width: 100%;
  padding: 11px 14px;
  font-family: 'DM Mono', monospace;
  font-size: 14px;
  font-weight: 500;
  color: var(--dark);
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  outline: none;
  transition: border-color .15s;
}

.field input:focus { border-color: var(--orange); }
.field input::placeholder { color: #C0C0C8; font-weight: 400; font-family: 'DM Sans', sans-serif; font-size: 13px; }

.btn {
  width: 100%;
  padding: 12px;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 600;
  color: var(--white);
  background: var(--orange);
  border: none;
  border-radius: var(--radius);
  cursor: pointer;
  margin-top: 2px;
  transition: background .15s, transform .1s;
}

.btn:hover { background: #D9720F; }
.btn:active { transform: scale(0.99); }

.results { margin-top: 22px; }

.result-hs {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  font-weight: 500;
  color: var(--mid);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 10px;
}

.section {
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  margin-bottom: 10px;
}

.section-header {
  padding: 10px 16px;
  background: var(--dark);
  color: var(--white);
  font-size: 13px;
  font-weight: 600;
}

.section-body { padding: 10px 16px 12px; }

.row {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  padding: 7px 0;
  border-bottom: 1px solid var(--border);
  gap: 12px;
}

.row:last-child { border-bottom: none; }

.row-label { font-size: 12px; color: var(--mid); white-space: nowrap; }

.row-val {
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  font-weight: 500;
  color: var(--dark);
  text-align: right;
}

.row-val.accent { color: var(--orange); }

.desc-block { padding: 8px 0 4px; border-bottom: 1px solid var(--border); position: relative; }
.desc-block-label { font-size: 11px; color: var(--mid); font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 4px; }

.desc {
  font-size: 13px;
  color: var(--dark);
  line-height: 1.5;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.desc.open { -webkit-line-clamp: unset; }

.more {
  font-size: 11px;
  font-weight: 600;
  color: var(--orange);
  position: absolute;
  bottom: 4px;
  right: 0;
  background: var(--white);
  padding-left: 8px;
  cursor: pointer;
  letter-spacing: 0.02em;
}

.error { font-size: 13px; color: #C0392B; padding: 10px 0; }

.result-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 10px;
  padding: 10px 14px;
  background: var(--orange-light);
  border: 1px solid var(--orange);
  border-radius: 8px;
}

.result-row-label {
  font-size: 12px;
  font-weight: 600;
  color: var(--orange);
  text-transform: uppercase;
  letter-spacing: 0.06em;
}

.result-row-val {
  font-family: 'DM Mono', monospace;
  font-size: 16px;
  font-weight: 600;
  color: var(--orange);
}

.field-inline {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 10px;
}

.field-inline label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--mid);
  white-space: nowrap;
  min-width: 110px;
}

.field-inline input {
  width: 100px;
  padding: 4px 10px;
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  font-weight: 500;
  color: var(--dark);
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 6px;
  outline: none;
  transition: border-color .15s;
}

.field-inline input:focus { border-color: var(--orange); }

.settings-divider {
  width: 100%;
  border: none;
  border-top: 1px solid var(--border);
  margin: 8px 0;
}

.footer {
  text-align: center;
  font-size: 11px;
  color: var(--mid);
  margin-top: 20px;
  letter-spacing: 0.04em;
}
</style>
</head>

<body>

<div class="header">
  <img src="logo_cjz.png" alt="Celní jednatelství Zelinka">
  <span class="header-label">CBAM Kalkulačka</span>
</div>

<div class="main">

  <div class="page-title">
    <h1>Nominální hodnoty CBAM</h1>
    <p>Zadejte HS kód a volitelně filtrujte podle země původu</p>
  </div>

  <div class="card">

    <div class="card-topbar">
      <div class="settings-btn" id="settingsBtn" onclick="toggleSettings()">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="8" cy="8" r="2.5"/>
          <path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.05 3.05l1.41 1.41M11.54 11.54l1.41 1.41M3.05 12.95l1.41-1.41M11.54 4.46l1.41-1.41"/>
        </svg>
        Nastavení
      </div>
    </div>

    <div class="settings-bar" id="settingsBar">
      <div class="settings-group">
        <span class="settings-label">Zobrazit</span>
        <div class="toggle-group">
          <label class="toggle" id="toggleA">
            <input type="checkbox" id="showA"> Benchmark A
          </label>
          <label class="toggle active" id="toggleB">
            <input type="checkbox" id="showB" checked> Benchmark B
          </label>
        </div>
      </div>
      <div class="settings-group">
        <span class="settings-label">Rok</span>
        <select id="yearSelect" class="year-select">
          <option value="2026">2026</option>
          <option value="2027">2027</option>
          <option value="2028">2028+</option>
        </select>
      </div>
      <hr class="settings-divider">
      <div class="field-inline">
        <label>Alokace</label>
        <input type="number" id="alokace" value="0.975" step="0.001" min="0" max="1">
      </div>
      <div class="field-inline">
        <label>Cena povolenky</label>
        <input type="number" id="cenaPovolenky" value="80" step="0.01" min="0">
      </div>
    </div>

    <div class="card-body">
      <div class="field">
        <label>HS kód</label>
        <input id="hs" list="hsList" placeholder="např. 25231000">
        <datalist id="hsList"></datalist>
      </div>

      <div class="field">
        <label>Země původu &nbsp;<span style="font-weight:400;text-transform:none;letter-spacing:0;font-size:11px">(volitelné)</span></label>
        <input id="country" list="countryList" placeholder="např. Albania">
        <datalist id="countryList"></datalist>
      </div>

      <button class="btn" onclick="calculate()">Vyhledat</button>

      <div class="results" id="result"></div>
    </div>

  </div>

  <div class="footer" id="version"></div>
</div>

<script src="app.js"></script>

<script>
  function toggleSettings(){
    const bar = document.getElementById('settingsBar');
    bar.classList.toggle('open');
  }

  // Close settings when clicking outside
  document.addEventListener('click', e => {
    const bar = document.getElementById('settingsBar');
    const btn = document.getElementById('settingsBtn');
    if(bar.classList.contains('open') && !bar.contains(e.target) && !btn.contains(e.target)){
      bar.classList.remove('open');
    }
  });

  ['showA','showB'].forEach(id => {
    const cb = document.getElementById(id);
    const lbl = document.getElementById('toggle' + id.slice(-1));
    cb.addEventListener('change', () => lbl.classList.toggle('active', cb.checked));
  });
</script>

</body>
</html>

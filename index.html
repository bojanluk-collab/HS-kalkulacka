<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>HS Kalkulačka</title>

<style>
body {
  font-family: Arial;
  max-width: 600px;
  margin: 40px auto;
}
input, button {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
}
.result {
  background: #f3f3f3;
  padding: 15px;
  margin-top: 20px;
}
</style>

</head>
<body>

<h2>HS Kalkulačka</h2>

<label>HS kód</label>
<input id="hs" list="hsList">

<label>Země</label>
<input id="country" list="countryList">
<datalist id="countryList"></datalist>

<button onclick="calculate()">Spočítat</button>

<div id="result" class="result"></div>

<script src="app.js"></script>

</body>
</html>

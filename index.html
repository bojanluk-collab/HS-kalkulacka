<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>HS Kalkulačka</title>

<style>
body {
    font-family: system-ui, -apple-system, sans-serif;
    background: #f5f7fb;
    display: flex;
    justify-content: center;
    padding: 40px 10px;
}

.app {
    width: 100%;
    max-width: 480px;
}

.card {
    background: white;
    border-radius: 12px;
    padding: 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.05);
}

h2 {
    margin-top: 0;
    font-size: 20px;
}

label {
    font-size: 13px;
    color: #666;
}

input {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    margin-bottom: 15px;
    border-radius: 8px;
    border: 1px solid #ddd;
}

button {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: none;
    background: #3b82f6;
    color: white;
    font-weight: 600;
    cursor: pointer;
}

button:hover {
    background: #2563eb;
}

.result {
    margin-top: 20px;
    font-size: 14px;
}

.section {
    margin-top: 15px;
    padding-top: 10px;
    border-top: 1px solid #eee;
}

.value {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin: 5px 0;
}

.copy {
    cursor: pointer;
    font-size: 14px;
    color: #888;
}

.copy:hover {
    color: black;
}

.footer {
    text-align: center;
    font-size: 12px;
    color: #888;
    margin-top: 15px;
}
</style>

</head>
<body>

<div class="app">

<div class="card">
<h2>HS Kalkulačka</h2>

<label>HS kód</label>
<input id="hs" list="hsList">
<datalist id="hsList"></datalist>

<label>Země</label>
<input id="country" list="countryList">
<datalist id="countryList"></datalist>

<button onclick="calculate()">Spočítat</button>

<div id="result" class="result"></div>
</div>

<div id="version" class="footer"></div>

</div>

<script src="app.js?v=4"></script>
</body>
</html>
